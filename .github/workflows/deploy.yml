name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [ "main" ] # Trigger deployment on push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for git-gh-pages

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Specify your Node.js version

    - name: Install dependencies and Build PWA
      run: |
        cd roadmap-automacao-2026/pwa
        npm install
        npm run build
        # Verify build output
        if [ ! -d "dist" ]; then echo "Build failed: 'dist' directory not found." && exit 1; fi
        if [ -z "$(ls -A dist)" ]; then echo "Build failed: 'dist' directory is empty." && exit 1; fi
      env:
        CI: true

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./pwa/dist # Corrected path relative to repo root
        # Optional: Add custom domain if needed
        # cname: your.domain.com
